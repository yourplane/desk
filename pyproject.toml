[project]
name = "desk"
version = "0.1.0"
description = "CLI to manage EC2 workstations—SSH over SSM, private subnets only"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "boto3>=1.34.0",
    "click>=8.0.0",
]

[project.scripts]
desk = "desk.cli:main"

[project.optional-dependencies]
dev = [
    "cfn-lint>=0.90.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "tox>=4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.tox]
package = "editable"
env_list = ["py", "lint"]

[tool.tox.env.lint]
package = "skip"
description = "Lint CloudFormation templates with cfn-lint"
deps = ["cfn-lint>=0.90.0"]
commands = [["cfn-lint", "infrastructure"]]

[tool.tox.env.py]
description = "Run unit tests"
deps = ["pytest>=7.0.0", "pytest-cov>=4.0.0"]
commands = ["pytest tests/ -v"]

[tool.pytest.ini_options]
testpaths = ["tests"]
