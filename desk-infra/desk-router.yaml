AWSTemplateFormatVersion: "2010-09-09"
Description: Managed desk router - one private EC2 instance in an ASG (Type=router, Name=router)

Parameters:
  RouterAmiId:
    Type: String
    Description: AMI ID - use the latest router-ami-* at deploy time; redeploy this stack to pick a newer AMI.
  InstanceType:
    Type: String
    Default: t3.small
    Description: Burstable instance; default is enough for a small number of routes and users (override if needed).
  DeskWebAppStackName:
    Type: String
    Default: desk-web
    Description: >-
      Name of the SAM/web-app stack that defines the data bucket (DeskDataBucketName output).
      Must match the stack used for `sam deploy`; bucket name is {stack}-data-{account}.
  DeskVpcStackName:
    Type: String
    Default: desk
    Description: >-
      VPC stack name probed when resolving the data bucket (second candidate after DeskWebAppStackName).

Resources:
  RouterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-router-sg
      GroupDescription: Desk managed router - no inbound; egress for SSM and NAT (no instance-to-instance access)
      VpcId: !ImportValue desk-VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Egress for SSM, NAT, package updates
      Tags:
        - Key: Name
          Value: desk-router-sg
        - Key: desk:managed
          Value: "true"

  RouterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: desk-router-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: desk:managed
          Value: "true"

  # desk route refresh / add on the router resolves workstations via EC2 and uses SSM port forwarding.
  RouterDeskCliPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: desk-router-desk-cli
      Roles:
        - !Ref RouterRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DescribeInstancesForResolve
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
            Resource: "*"
          - Sid: SsmDescribeForReadyCheck
            Effect: Allow
            Action:
              - ssm:DescribeInstanceInformation
            Resource: "*"
          - Sid: SsmPortForwardingSessions
            Effect: Allow
            Action:
              - ssm:StartSession
            Resource:
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-StartPortForwardingSession"
          - Sid: SsmTerminateSession
            Effect: Allow
            Action:
              - ssm:TerminateSession
            Resource: "*"
          # route-sync pull: resolve DESK_DATA_BUCKET via CloudFormation outputs, then read web-routes.json from S3.
          - Sid: CfnDescribeDeskDataStacks
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${WebStack}/*"
                - WebStack: !Ref DeskWebAppStackName
              - !Sub
                - "arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${VpcStack}/*"
                - VpcStack: !Ref DeskVpcStackName
          - Sid: S3DeskDataBucketRead
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub
                - "arn:${AWS::Partition}:s3:::${Prefix}-data-${AWS::AccountId}"
                - Prefix: !Ref DeskWebAppStackName
              - !Sub
                - "arn:${AWS::Partition}:s3:::${Prefix}-data-${AWS::AccountId}/*"
                - Prefix: !Ref DeskWebAppStackName

  RouterInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: desk-router-profile
      Roles:
        - !Ref RouterRole

  RouterLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: desk-router-lt
      LaunchTemplateData:
        ImageId: !Ref RouterAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref RouterInstanceProfile
        SecurityGroupIds:
          - !Ref RouterSecurityGroup
        MetadataOptions:
          HttpTokens: optional
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: router
              - Key: Type
                Value: router
              - Key: desk:managed
                Value: "true"

  RouterAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: desk-router-asg
      # Export is comma-separated; ASG requires a list of subnet IDs
      VPCZoneIdentifier: !Split [",", !ImportValue desk-PrivateSubnetIds]
      LaunchTemplate:
        LaunchTemplateId: !Ref RouterLaunchTemplate
        Version: !GetAtt RouterLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: router
          PropagateAtLaunch: false
        - Key: desk:managed
          Value: "true"
          PropagateAtLaunch: false

Outputs:
  RouterAsgName:
    Description: Auto Scaling group name for the managed router
    Value: !Ref RouterAsg
  RouterSecurityGroupId:
    Description: Security group attached to router instances
    Value: !Ref RouterSecurityGroup
  RouterLaunchTemplateId:
    Description: Launch template for router instances
    Value: !Ref RouterLaunchTemplate
