AWSTemplateFormatVersion: "2010-09-09"
Description: Managed desk router - one private EC2 instance in an ASG (Type=router, Name=router), internal ALB for CloudFront VPC origin

Parameters:
  RouterAmiId:
    Type: String
    Description: AMI ID - use the latest router-ami-* at deploy time; redeploy this stack to pick a newer AMI.
  InstanceType:
    Type: String
    Default: t3.small
    Description: Burstable instance; default is enough for a small number of routes and users (override if needed).
  WebRouterBaseDomain:
    Type: String
    Default: ""
    Description: >-
      When set (e.g. desk.example.com), instance user-data reconfigures the web router to listen on 0.0.0.0:8780
      and sets DESK_WEB_ROUTER_BASE_DOMAIN for public {name}-{port} hostnames. Leave empty for local-only router.
  CloudFrontVpcOriginPrefixListId:
    Type: String
    Description: >-
      EC2 managed prefix list ID for CloudFront VPC origins (com.amazonaws.global.cloudfront.origin-facing.vpc).
      Required for the internal ALB security group. Look up with deploy.sh or the EC2 console.

Resources:
  RouterAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-router-alb-sg
      GroupDescription: Inbound from CloudFront VPC origins only; egress to router targets
      VpcId: !ImportValue desk-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !Ref CloudFrontVpcOriginPrefixListId
          Description: CloudFront VPC origin to ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: To targets and health checks
      Tags:
        - Key: Name
          Value: desk-router-alb-sg
        - Key: desk:managed
          Value: "true"

  RouterAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: desk-router-alb
      Type: application
      Scheme: internal
      IpAddressType: ipv4
      Subnets: !Split [",", !ImportValue desk-PrivateSubnetIds]
      SecurityGroups:
        - !Ref RouterAlbSecurityGroup
      Tags:
        - Key: Name
          Value: desk-router-alb
        - Key: desk:managed
          Value: "true"

  RouterTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: desk-router-tg
      VpcId: !ImportValue desk-VpcId
      Port: 8780
      Protocol: HTTP
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: TCP
      HealthCheckPort: "8780"
      Tags:
        - Key: desk:managed
          Value: "true"

  RouterListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref RouterAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref RouterTargetGroup

  RouterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-router-sg
      GroupDescription: Desk managed router - HTTP from internal ALB; egress for SSM and NAT
      VpcId: !ImportValue desk-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8780
          ToPort: 8780
          SourceSecurityGroupId: !Ref RouterAlbSecurityGroup
          Description: Web router from internal ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Egress for SSM, NAT, package updates
      Tags:
        - Key: Name
          Value: desk-router-sg
        - Key: desk:managed
          Value: "true"

  RouterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: desk-router-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: desk:managed
          Value: "true"

  # desk route refresh / add on the router resolves workstations via EC2 and uses SSM port forwarding.
  RouterDeskCliPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: desk-router-desk-cli
      Roles:
        - !Ref RouterRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DescribeInstancesForResolve
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceStatus
            Resource: "*"
          - Sid: SsmDescribeForReadyCheck
            Effect: Allow
            Action:
              - ssm:DescribeInstanceInformation
            Resource: "*"
          - Sid: SsmPortForwardingSessions
            Effect: Allow
            Action:
              - ssm:StartSession
            Resource:
              - !Sub "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"
              - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}::document/AWS-StartPortForwardingSession"
          - Sid: SsmTerminateSession
            Effect: Allow
            Action:
              - ssm:TerminateSession
            Resource: "*"

  RouterInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: desk-router-profile
      Roles:
        - !Ref RouterRole

  RouterLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: desk-router-lt
      LaunchTemplateData:
        ImageId: !Ref RouterAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref RouterInstanceProfile
        SecurityGroupIds:
          - !Ref RouterSecurityGroup
        MetadataOptions:
          HttpTokens: optional
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            sudo -u ubuntu env XDG_RUNTIME_DIR=/run/user/1000 bash -lc '
              export DESK_WEB_ROUTER_LISTEN=0.0.0.0:8780
              export DESK_WEB_ROUTER_BASE_DOMAIN=${WebRouterBaseDomain}
              desk web-router stop 2>/dev/null || true
              desk web-router start --on-boot
            '
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: router
              - Key: Type
                Value: router
              - Key: desk:managed
                Value: "true"

  RouterAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: desk-router-asg
      # Export is comma-separated; ASG requires a list of subnet IDs
      VPCZoneIdentifier: !Split [",", !ImportValue desk-PrivateSubnetIds]
      LaunchTemplate:
        LaunchTemplateId: !Ref RouterLaunchTemplate
        Version: !GetAtt RouterLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      TargetGroupARNs:
        - !Ref RouterTargetGroup
      Tags:
        - Key: Name
          Value: router
          PropagateAtLaunch: false
        - Key: desk:managed
          Value: "true"
          PropagateAtLaunch: false

Outputs:
  RouterAsgName:
    Description: Auto Scaling group name for the managed router
    Value: !Ref RouterAsg
  RouterSecurityGroupId:
    Description: Security group attached to router instances
    Value: !Ref RouterSecurityGroup
  RouterLaunchTemplateId:
    Description: Launch template for router instances
    Value: !Ref RouterLaunchTemplate
  RouterAlbDnsName:
    Description: DNS name of the internal ALB (CloudFront VPC origin)
    Value: !GetAtt RouterAlb.DNSName
    Export:
      Name: desk-router-RouterAlbDnsName
  RouterAlbArn:
    Description: ARN of the internal ALB (CloudFront VPC origin endpoint)
    Value: !Ref RouterAlb
    Export:
      Name: desk-router-RouterAlbArn
  RouterAlbHostedZoneId:
    Description: Route 53 hosted zone ID for the internal ALB (alias records)
    Value: !GetAtt RouterAlb.CanonicalHostedZoneID
    Export:
      Name: desk-router-RouterAlbHostedZoneId
