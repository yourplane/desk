AWSTemplateFormatVersion: "2010-09-09"
Description: VPC and networking for desk - private workstations with SSH over SSM

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: desk-vpc
        - Key: desk:managed
          Value: "true"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: desk-igw
        - Key: desk:managed
          Value: "true"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.254.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: desk-public
        - Key: desk:managed
          Value: "true"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: desk-private-1
        - Key: desk:managed
          Value: "true"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: desk-private-2
        - Key: desk:managed
          Value: "true"

  NatSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-nat-sg
      GroupDescription: Security group for desk NAT instance
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 10.0.1.0/24
          Description: Allow forwarding traffic from private subnet 1
        - IpProtocol: -1
          CidrIp: 10.0.2.0/24
          Description: Allow forwarding traffic from private subnet 2
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound internet traffic
      Tags:
        - Key: Name
          Value: desk-nat-sg
        - Key: desk:managed
          Value: "true"

  NatRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: desk-nat-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: desk:managed
          Value: "true"

  NatInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: desk-nat-profile
      Roles:
        - !Ref NatRole

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: desk-nat-eip
        - Key: desk:managed
          Value: "true"

  NatInstance:
    Type: AWS::EC2::Instance
    DependsOn: InternetGatewayAttachment
    Properties:
      ImageId: !Sub "{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id}}"
      InstanceType: t4g.nano
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref NatSecurityGroup
      IamInstanceProfile: !Ref NatInstanceProfile
      SourceDestCheck: false
      MetadataOptions:
        HttpTokens: required
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y iptables-persistent
          sysctl -w net.ipv4.ip_forward=1
          cat >/etc/sysctl.d/99-desk-nat.conf <<'EOF'
          net.ipv4.ip_forward=1
          EOF
          iptables -t nat -A POSTROUTING -o $(ip route show default | awk '/default/ {print $5; exit}') -j MASQUERADE
          iptables-save >/etc/iptables/rules.v4
      Tags:
        - Key: Name
          Value: desk-nat-instance
        - Key: Type
          Value: infra
        - Key: desk:role
          Value: nat
        - Key: desk:managed
          Value: "true"

  NatEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      InstanceId: !Ref NatInstance

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: desk-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: desk-private-rt

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref NatInstance

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  WorkstationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-workstation-sg
      GroupDescription: Security group for desk workstations (no inbound; SSM uses outbound)
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: desk-workstation-sg
        - Key: desk:managed
          Value: "true"

  WorkstationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: desk-workstation-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: desk:managed
          Value: "true"

  WorkstationInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: desk-workstation-profile
      Roles:
        - !Ref WorkstationRole

  NatLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: desk-nat-launch-template
      LaunchTemplateData:
        ImageId: !Sub "{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/arm64/hvm/ebs-gp3/ami-id}}"
        InstanceType: t4g.nano
        IamInstanceProfile:
          Name: !Ref NatInstanceProfile
        SecurityGroupIds:
          - !Ref NatSecurityGroup
        MetadataOptions:
          HttpTokens: required
        UserData:
          Fn::Base64: |
            #!/bin/bash
            set -euxo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y iptables-persistent
            sysctl -w net.ipv4.ip_forward=1
            cat >/etc/sysctl.d/99-desk-nat.conf <<'EOF'
            net.ipv4.ip_forward=1
            EOF
            iptables -t nat -A POSTROUTING -o $(ip route show default | awk '/default/ {print $5; exit}') -j MASQUERADE
            iptables-save >/etc/iptables/rules.v4

  NatAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: desk-nat-asg
      VPCZoneIdentifier:
        - !Ref PublicSubnet
      MinSize: "0"
      MaxSize: "1"
      DesiredCapacity: "0"
      LaunchTemplate:
        LaunchTemplateId: !Ref NatLaunchTemplate
        Version: !GetAtt NatLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: desk-nat-asg-spare
          PropagateAtLaunch: true
        - Key: Type
          Value: infra
          PropagateAtLaunch: true
        - Key: desk:role
          Value: nat
          PropagateAtLaunch: true
        - Key: desk:managed
          Value: "true"
          PropagateAtLaunch: true

  DeskCopyBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "desk-${AWS::AccountId}-${AWS::Region}-copy"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: desk:managed
          Value: "true"
        - Key: Name
          Value: desk-copy-bucket

  WorkstationDeskCopyBucketPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: desk-copy-bucket-access
      Roles:
        - !Ref WorkstationRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt DeskCopyBucket.Arn
              - !Sub "${DeskCopyBucket.Arn}/*"

Outputs:
  VpcId:
    Description: VPC ID for desk workstations
    Value: !Ref Vpc
    Export:
      Name: desk-VpcId

  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs (use for workstation launch)
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: desk-PrivateSubnetIds

  PrivateSubnet1Id:
    Description: First private subnet ID
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: Second private subnet ID
    Value: !Ref PrivateSubnet2

  WorkstationSecurityGroupId:
    Description: Security group ID for workstation instances
    Value: !Ref WorkstationSecurityGroup
    Export:
      Name: desk-WorkstationSecurityGroupId

  WorkstationInstanceProfile:
    Description: IAM instance profile name for workstations
    Value: !Ref WorkstationInstanceProfile
    Export:
      Name: desk-WorkstationInstanceProfile

  DeskCopyBucketName:
    Description: S3 bucket for desk copy (use s3:/key in desk copy)
    Value: !Ref DeskCopyBucket
    Export:
      Name: desk-DeskCopyBucketName

  NatInstanceId:
    Description: NAT instance ID for private subnet default route
    Value: !Ref NatInstance
