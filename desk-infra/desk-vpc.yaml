AWSTemplateFormatVersion: "2010-09-09"
Description: VPC and networking for desk - private workstations with SSH over SSM

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: desk-vpc
        - Key: desk:managed
          Value: "true"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: desk-igw
        - Key: desk:managed
          Value: "true"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.254.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: desk-public
        - Key: desk:managed
          Value: "true"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: desk-private-1
        - Key: desk:managed
          Value: "true"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: desk-private-2
        - Key: desk:managed
          Value: "true"

  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: desk-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: InternetGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: desk-nat

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: desk-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: desk-private-rt

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  WorkstationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: desk-workstation-sg
      GroupDescription: Security group for desk workstations (no inbound; SSM uses outbound)
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: desk-workstation-sg
        - Key: desk:managed
          Value: "true"

  WorkstationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: desk-workstation-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: desk:managed
          Value: "true"

  WorkstationInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: desk-workstation-profile
      Roles:
        - !Ref WorkstationRole

  DeskCopyBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "desk-${AWS::AccountId}-${AWS::Region}-copy"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: desk:managed
          Value: "true"
        - Key: Name
          Value: desk-copy-bucket

  WorkstationDeskCopyBucketPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: desk-copy-bucket-access
      Roles:
        - !Ref WorkstationRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt DeskCopyBucket.Arn
              - !Sub "${DeskCopyBucket.Arn}/*"

Outputs:
  VpcId:
    Description: VPC ID for desk workstations
    Value: !Ref Vpc
    Export:
      Name: desk-VpcId

  PrivateSubnetIds:
    Description: Comma-separated private subnet IDs (use for workstation launch)
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: desk-PrivateSubnetIds

  PrivateSubnet1Id:
    Description: First private subnet ID
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: Second private subnet ID
    Value: !Ref PrivateSubnet2

  WorkstationSecurityGroupId:
    Description: Security group ID for workstation instances
    Value: !Ref WorkstationSecurityGroup
    Export:
      Name: desk-WorkstationSecurityGroupId

  WorkstationInstanceProfile:
    Description: IAM instance profile name for workstations
    Value: !Ref WorkstationInstanceProfile
    Export:
      Name: desk-WorkstationInstanceProfile

  DeskCopyBucketName:
    Description: S3 bucket for desk copy (use s3:/key in desk copy)
    Value: !Ref DeskCopyBucket
    Export:
      Name: desk-DeskCopyBucketName
