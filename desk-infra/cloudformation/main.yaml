AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Desk web app - Cognito (basic), Lambda (SAM), API Gateway, S3, CloudFront, WAF. Auth at CloudFront + API Gateway JWT.

Parameters:
  CustomDomainName:
    Type: String
    Default: ""
    Description: >-
      Optional FQDN for the app (e.g. desk.example.com). Leave empty to use only the CloudFront domain.
      Requires AcmCertificateArn (ACM in us-east-1). Request a cert that also covers *.<apex> if you will use
      subdomains under the same zone later.
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN in us-east-1 for CustomDomainName (and optional wildcard SANs). Required when
      CustomDomainName is non-empty.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomainName, ""]]

Rules:
  AcmRequiredWithCustomDomain:
    RuleCondition: !Not [!Equals [!Ref CustomDomainName, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref AcmCertificateArn, ""]]
        AssertDescription: AcmCertificateArn must be set when CustomDomainName is non-empty.

Resources:
  # ---- Cognito (basic: username/password, no Google) ----
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-pool"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Schema:
        - Name: email
          Required: true
          Mutable: false

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub "${AWS::StackName}-${AWS::AccountId}"

  UserPoolAppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: desk-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO
      # Keep refresh tokens long-lived so the SPA can renew the short-lived id_token.
      RefreshTokenValidity: 39
      # OAuth redirect URIs: CloudFront default domain always; add custom domain when configured.
      CallbackURLs: !If
        - HasCustomDomain
        - - !Sub "https://${CloudFrontDistribution.DomainName}"
          - !Sub "https://${CustomDomainName}"
        - - !Sub "https://${CloudFrontDistribution.DomainName}"
      LogoutURLs: !If
        - HasCustomDomain
        - - !Sub "https://${CloudFrontDistribution.DomainName}"
          - !Sub "https://${CustomDomainName}"
        - - !Sub "https://${CloudFrontDistribution.DomainName}"
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  # ---- desk-api Lambda (SAM builds and deploys via sam build / sam deploy) ----
  DeskApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      Runtime: python3.12
      Handler: lambda_handler.handler
      CodeUri: ../../desk-api
      Timeout: 30
      MemorySize: 256
      Policies:
        - Statement:
            - Effect: Allow
              Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
              Resource: "*"
            - Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:DescribeTags
                - ec2:DescribeImages
                - ec2:StartInstances
                - ec2:StopInstances
                - ec2:TerminateInstances
                - ec2:RunInstances
                - ec2:CreateTags
                - ec2:DeleteTags
              Resource: "*"
            - Effect: Allow
              Action: cloudformation:DescribeStacks
              Resource: "*"
            - Effect: Allow
              Action:
                - ce:GetCostAndUsage
              Resource: "*"
            - Effect: Allow
              Action:
                - ssm:DescribeInstanceInformation
                - ssm:SendCommand
                - ssm:GetCommandInvocation
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "${DataBucket.Arn}/*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt DataBucket.Arn
            - Effect: Allow
              Action: iam:PassRole
              Resource: "*"
              Condition:
                StringEquals:
                  iam:PassedToService: ec2.amazonaws.com
      Environment:
        Variables:
          DESK_DATA_BUCKET: !Ref DataBucket
    Metadata:
      BuildMethod: makefile

  # ---- API Gateway (JWT authorizer = Cognito, no custom Lambda) ----
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [GET, HEAD, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Authorization, Content-Type]

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: cognito-jwt
      AuthorizerType: JWT
      IdentitySource:
        - $request.header.Authorization
      JwtConfiguration:
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
        Audience:
          - !Ref UserPoolAppClient

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-api"
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /api/{proxy+}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${ApiIntegration}"

  ApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /api"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeskApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # ---- S3 data bucket (saved commands, etc.) ----
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-data-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---- S3 frontend ----
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---- OAC ----
  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---- WAF ----
  WafRule:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-waf"
      Scope: CLOUDFRONT
      DefaultAction: { Allow: {} }
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-waf"
      Rules:
        - Name: RateLimitRule
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 100
              AggregateKeyType: IP
          Action: { Block: {} }
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitRule

  # ---- Public web routes ({name}-{port}.*) via CloudFront VPC origin → internal ALB (desk-router stack) ----
  DeskWebRouterVpcOrigin:
    Type: AWS::CloudFront::VpcOrigin
    Condition: HasCustomDomain
    Properties:
      VpcOriginEndpointConfig:
        Arn: !ImportValue desk-router-RouterAlbArn
        Name: !Sub "${AWS::StackName}-desk-web-router-vpc"
        HTTPPort: 80
        HTTPSPort: 443
        OriginProtocolPolicy: http-only

  RouterSubdomainAuthFunction:
    Type: AWS::CloudFront::Function
    Condition: HasCustomDomain
    Properties:
      Name: !Sub "${AWS::StackName}-router-subdomain-auth"
      AutoPublish: true
      FunctionCode: !Sub |
        function handler(event) {
          var request = event.request;
          var hostHeader = request.headers.host;
          var host = hostHeader ? hostHeader.value : "";
          var apex = "${CustomDomainName}";
          if (host.length > 0 && host !== apex && host.endsWith("." + apex)) {
            var cookie = request.headers.cookie;
            var has = false;
            if (cookie && cookie.value) {
              has = cookie.value.indexOf("desk_token=") >= 0;
            }
            if (!has) {
              return {
                statusCode: 302,
                statusDescription: "Found",
                headers: { location: { value: "https://" + apex + "/" } }
              };
            }
          }
          return request;
        }
      FunctionConfig:
        Comment: Require desk_token cookie on *.apex hostnames (public web routes)
        Runtime: cloudfront-js-2.0

  DeskWebRouterDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasCustomDomain
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} public web routes (*.${CustomDomainName})"
        HttpVersion: http2and3
        Origins:
          - Id: DeskRouterAlbVpcOrigin
            DomainName: !ImportValue desk-router-RouterAlbDnsName
            VpcOriginConfig:
              VpcOriginId: !Ref DeskWebRouterVpcOrigin
        DefaultCacheBehavior:
          TargetOriginId: DeskRouterAlbVpcOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RouterSubdomainAuthFunction.FunctionMetadata.FunctionARN
        Aliases:
          - !Sub "*.${CustomDomainName}"
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        WebACLId: !GetAtt WafRule.Arn

  # ---- CloudFront ----
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: ApiStage
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: ApiOrigin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          DefaultTTL: 0
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        Aliases: !If
          - HasCustomDomain
          - - !Ref CustomDomainName
          - []
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        WebACLId: !GetAtt WafRule.Arn
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
  CloudFrontDomain:
    Description: CloudFront domain (target for a CNAME/ALIAS to this distribution)
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontURL:
    Description: App URL on the default CloudFront domain
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  CanonicalAppURL:
    Description: Primary app URL (custom domain if configured, else CloudFront)
    Value: !If
      - HasCustomDomain
      - !Sub "https://${CustomDomainName}"
      - !Sub "https://${CloudFrontDistribution.DomainName}"
  FrontendBucketName:
    Value: !Ref FrontendBucket
  DeskDataBucketName:
    Value: !Ref DataBucket
  UserPoolId:
    Value: !Ref UserPool
  AppClientId:
    Value: !Ref UserPoolAppClient
  UserPoolDomain:
    Value: !Ref UserPoolDomain
  ApiEndpoint:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  WebRouterCloudFrontDomain:
    Condition: HasCustomDomain
    Description: DNS target for wildcard public web routes (*.CustomDomainName) — create Route 53 ALIAS *.apex → this
    Value: !GetAtt DeskWebRouterDistribution.DomainName
  WebRouterCloudFrontURL:
    Condition: HasCustomDomain
    Description: Example base URL for web routes (host is {name}-{port}.CustomDomainName)
    Value: !Sub "https://example.${CustomDomainName}/"
