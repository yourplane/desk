AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Lambda that runs desk control-plane commands (list, start, stop, create, ami, tab list/create/close, etc.). Excludes connect and scp.

Resources:
  DeskControlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: desk-control
      Description: Run desk control-plane operations (list, start, stop, create, ami, tab list/create/close, etc.)
      Runtime: python3.12
      CodeUri: control/
      Handler: handler.handler
      Timeout: 300
      MemorySize: 256
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:DescribeImages
                - ec2:DescribeInstanceStatus
                - ec2:DescribeTags
                - ec2:StartInstances
                - ec2:StopInstances
                - ec2:RunInstances
                - ec2:TerminateInstances
                - ec2:CreateImage
                - ec2:CreateTags
                - ec2:DeregisterImage
                - ec2:DescribeImageAttribute
              Resource: "*"
            - Effect: Allow
              Action:
                - ssm:SendCommand
                - ssm:GetCommandInvocation
                - ssm:ListCommandInvocations
              Resource: "*"
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: "*"
              Condition:
                StringEquals:
                  iam:PassedToService: ec2.amazonaws.com
            - Effect: Allow
              Action:
                - cloudformation:DescribeStacks
              Resource: "*"
      Tags:
        desk:managed: "true"
    Metadata:
      BuildMethod: makefile

Outputs:
  DeskControlFunctionArn:
    Description: ARN of the desk-control Lambda function
    Value: !GetAtt DeskControlFunction.Arn
