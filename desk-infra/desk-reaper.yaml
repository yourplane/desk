AWSTemplateFormatVersion: "2010-09-09"
Description: EventBridge schedule that invokes the Desk API reap endpoint through IAM auth

Parameters:
  HttpApiId:
    Type: String
    Description: HTTP API ID from the desk main infrastructure stack
  ApiStageName:
    Type: String
    Default: "$default"
    Description: API stage name
  ReaperScheduleExpression:
    Type: String
    Default: rate(10 minutes)
    Description: EventBridge schedule expression for auto-reap runs

Resources:
  ReaperScheduleInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Allows EventBridge to invoke the reap API route with SigV4 IAM auth
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-reap-api
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/${ApiStageName}/POST/api/workstations/reap"

  ReaperScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Trigger the Desk API reap endpoint every 10 minutes
      ScheduleExpression: !Ref ReaperScheduleExpression
      State: ENABLED
      Targets:
        - Id: DeskApiReapEndpoint
          Arn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApiId}/${ApiStageName}/POST/api/workstations/reap"
          RoleArn: !GetAtt ReaperScheduleInvokeRole.Arn
          Input: "{}"

Outputs:
  ReaperScheduleRuleArn:
    Description: ARN of the EventBridge schedule rule targeting the Desk API
    Value: !GetAtt ReaperScheduleRule.Arn
